{% extends 'base.html' %}
{% block title %}Register — CodeQuiz{% endblock %}

{% block extra_css %}
<style>
.auth-wrap { display:flex; justify-content:center; align-items:center; min-height:calc(100vh - 200px); }
.auth-card { width:100%; max-width:420px; background:var(--surface); border:1px solid var(--border); border-radius:16px; padding:2.5rem 2rem; }
.auth-logo { text-align:center; font-family:var(--font-head); font-size:1.8rem; font-weight:800; margin-bottom:0.5rem; }
.auth-logo span { color:var(--accent); }
.auth-sub { text-align:center; color:var(--muted); font-size:0.8rem; margin-bottom:2rem; }
.form-group { margin-bottom:1.2rem; }
.form-label { display:block; font-size:0.7rem; letter-spacing:0.1em; color:var(--muted); margin-bottom:0.5rem; }
.form-input { width:100%; background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:0.75rem 1rem; color:var(--text); font-family:var(--font-mono); font-size:0.85rem; transition:border-color 0.2s; outline:none; }
.form-input:focus { border-color:var(--accent); }
.btn-full { width:100%; justify-content:center; padding:0.8rem; font-size:0.85rem; }
.auth-footer { text-align:center; margin-top:1.5rem; font-size:0.8rem; color:var(--muted); }
.auth-footer a { color:var(--accent); text-decoration:none; }
.auth-footer a:hover { text-decoration:underline; }
.hint { font-size:0.7rem; color:var(--muted); margin-top:0.3rem; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo"><span>{</span>CQ<span>}</span></div>
        <p class="auth-sub">// CREATE YOUR ACCOUNT</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">USERNAME</label>
                <input type="text" name="username" class="form-input" required autofocus placeholder="cool_coder42" minlength="3">
                <p class="hint">At least 3 characters</p>
            </div>
            <div class="form-group">
                <label class="form-label">EMAIL</label>
                <input type="email" name="email" class="form-input" required placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label class="form-label">PASSWORD</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••" minlength="6">
                <p class="hint">At least 6 characters</p>
            </div>
            <div class="form-group">
                <label class="form-label">CONFIRM PASSWORD</label>
                <input type="password" name="confirm_password" class="form-input" required placeholder="••••••••">
            </div>
            <button type="submit" class="btn btn-primary btn-full">CREATE ACCOUNT →</button>
        </form>

        <div class="auth-footer">
            Already have an account? <a href="{{ url_for('auth.login') }}">Login here</a>
        </div>
    </div>
</div>
{% endblock %}
