{% extends 'base.html' %}
{% block title %}Login — CodeQuiz{% endblock %}

{% block extra_css %}
<style>
.auth-wrap {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: calc(100vh - 200px);
}

.auth-card {
    width: 100%;
    max-width: 420px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 2.5rem 2rem;
}

.auth-logo {
    text-align: center;
    font-family: var(--font-head);
    font-size: 1.8rem;
    font-weight: 800;
    margin-bottom: 0.5rem;
}

.auth-logo span { color: var(--accent); }

.auth-sub {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-bottom: 2rem;
}

.form-group { margin-bottom: 1.2rem; }

.form-label {
    display: block;
    font-size: 0.7rem;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 0.5rem;
}

.form-input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    color: var(--text);
    font-family: var(--font-mono);
    font-size: 0.85rem;
    transition: border-color 0.2s;
    outline: none;
}

.form-input:focus { border-color: var(--accent); }

.form-check {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    font-size: 0.8rem;
    color: var(--muted);
    cursor: pointer;
}

.btn-full { width: 100%; justify-content: center; padding: 0.8rem; font-size: 0.85rem; }

.auth-footer {
    text-align: center;
    margin-top: 1.5rem;
    font-size: 0.8rem;
    color: var(--muted);
}

.auth-footer a { color: var(--accent); text-decoration: none; }
.auth-footer a:hover { text-decoration: underline; }
</style>
{% endblock %}

{% block content %}
<div class="auth-wrap">
    <div class="auth-card">
        <div class="auth-logo"><span>{</span>CQ<span>}</span></div>
        <p class="auth-sub">// WELCOME BACK, CODER</p>

        <form method="POST">
            <div class="form-group">
                <label class="form-label">USERNAME</label>
                <input type="text" name="username" class="form-input" required autofocus placeholder="your_username">
            </div>
            <div class="form-group">
                <label class="form-label">PASSWORD</label>
                <input type="password" name="password" class="form-input" required placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-check">
                    <input type="checkbox" name="remember">
                    Remember me for 7 days
                </label>
            </div>
            <button type="submit" class="btn btn-primary btn-full">LOGIN →</button>
        </form>

        <div class="auth-footer">
            No account? <a href="{{ url_for('auth.register') }}">Register here</a>
        </div>
    </div>
</div>
{% endblock %}
